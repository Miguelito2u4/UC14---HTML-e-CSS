<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario da escola</title>
</head>
<body>
 
  <label for="Nome"> Nome: </label>  
<input type="text" name="Nome" placeholder="Digite seu nome">

<br>

<label for="email">Email</label>
<input type="email" name="Email" placeholder="Digite seu email">

<br>

<label for="senha">Senha:</label>
<input type="password" name="SENHA" placeholder="digite seu senha">

<br>

<label for="numero">Idade:</label>
<input type="number" name="numero">

<br>
<label for="cor">Cor:</label>
<input type="color" name="Cor">

<br>
<label for="sexo">SEXO:</label>
<input type="radio" name="Sexo" value="masculino">Masculino
<input type="radio" name="Sexo" value="feminino">Feminino

<br>
<label for="Interesses">Interesses:   </label>
<input type="checkbox" name="Interesses" value="Musica"> Musica
<input type="checkbox" name="Interesses" value="arte"> Arte
<input type="checkbox" name="Interesses" value="esporte"> Esporte

<br>
<label for="arquivo">Arquivo:</label>
<input type="file" name="Arquivo" >







































    
</body>
</html>
