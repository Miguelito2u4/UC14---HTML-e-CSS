<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!DOCTYPE html>
<html>
<head>
    <style>
   button {
 position: absolute;
 padding: 15px;           
 animation: mover 0.2s infinite alternate;
    }
 @keyframes mover {
 0% { 
 left: 0px; 
 top: 0px; 
background: blue; 
color: rgb(233, 124, 8);
 }
 50% {
 background: green;
 }
 100% { 
left: 400px; 
top: 300px; 
background: red; 
color: rgb(98, 0, 255);
 }
   }
    </style>
</head>
<body>

    <button> Clique Se For Capaz </button>

</body>
</html>
